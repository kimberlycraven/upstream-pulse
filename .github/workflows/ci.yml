name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: type-check, lint, integration tests ──
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: upstream_pulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/upstream_pulse_test
      TEST_DATABASE_URL: postgresql://postgres:password@localhost:5432/upstream_pulse_test
      TEST_ADMIN_DATABASE_URL: postgresql://postgres:password@localhost:5432/postgres
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Audit for critical/high vulnerabilities
        run: npm audit --audit-level=high
        working-directory: backend

      - name: Type check
        run: npm run type-check
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend

  # ── Frontend: type-check, build ──
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Type check & build
        run: npm run build
        working-directory: frontend
