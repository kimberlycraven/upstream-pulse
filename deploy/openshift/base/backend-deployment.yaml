# =============================================================================
# Backend API Deployment
# Fastify server on port 3000 with health/readiness probes
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: upstream-pulse
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: upstream-pulse
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: upstream-pulse
        app.kubernetes.io/component: api
    spec:
      # Init container: push database schema before API starts
      initContainers:
        - name: db-migrate
          image: quay.io/org-pulse/upstream-pulse-backend:latest
          imagePullPolicy: Always
          command: ["node", "dist/shared/database/run-migrate.js"]
          env:
            - name: HOME
              value: /tmp
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      containers:
        - name: backend
          image: quay.io/org-pulse/upstream-pulse-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: upstream-pulse-secrets
                  key: GITHUB_TOKEN
            - name: GOOGLE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: upstream-pulse-secrets
                  key: GOOGLE_AI_API_KEY
            - name: GITHUB_TEAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: upstream-pulse-secrets
                  key: GITHUB_TEAM_TOKEN
          envFrom:
            - configMapRef:
                name: upstream-pulse-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
