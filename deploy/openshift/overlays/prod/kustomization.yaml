# Production overlay — core app + S3 backup CronJobs.
#
# Prerequisites:
#   1. aws-s3-credentials secret created (see base/secrets.example.yaml)
#   2. pg-backup image built and pushed (see base/backup.Dockerfile)
#
# Usage:
#   oc apply -k deploy/openshift/overlays/prod/
#   DEPLOY_ENV=prod ./deploy/deploy.sh apply
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- postgres-backup-cronjob.yaml
- postgres-backup-monitor-cronjob.yaml
- postgres-restore-test-cronjob.yaml

patches:
- path: configmap-patch.yaml

images:
- name: quay.io/org-pulse/upstream-pulse-backend
  newTag: 27a450d
- name: quay.io/org-pulse/upstream-pulse-frontend
  newTag: 27a450d
